name = "vaultdl"
main = "worker.js"
compatibility_date = "2024-09-01"

# Required for ES module Workers with static assets
node_compat = false

# ── Static assets served by this worker ──
[site]
bucket = "./"
include = ["index.html", "style.css", "app.js"]

# ── KV Namespace for caching & rate limiting ──
# Step 1: run →  wrangler kv:namespace create VAULTDL_CACHE
# Step 2: paste the returned id below
[[kv_namespaces]]
binding = "VAULTDL_CACHE"
id      = "073d838ea9034066ac3dc41131254fa8"

